# =============================================================================
# Example: Lite profile for a small project or prototype
# =============================================================================
#
# This profile keeps only the 8 core agents needed for a solo developer
# or a fast-moving prototype. Copy this file to `.renga.yml` at the root
# of the target repository.
# ---

project:
  framework_version: "1.0.59"

agents:
  mode: "whitelist"
  include:
    # --- Core Lite agents ---
    - seiji
    - software-architect
    - backend-dev
    - frontend-dev
    - code-reviewer
    - qa-engineer
    - debugger
    - git-expert
    - tech-writer

# WAIVERS — Targeted rule exceptions for this project
#
# Each waiver suspends one governance rule for a bounded period.
# validate_agents.py reads this list and flags missing/expired entries.
#
# Required fields:
#   rule         — the ERR code or rule name being waived (string)
#   reason       — justification, including who approved and when (string)
#   expires      — ISO date after which the waiver must be renewed (YYYY-MM-DD)
#   approved_by  — GitHub handle or name of the approving person (string)
#
# Process:
#   1. Fill all four fields below.
#   2. Document the decision in .github/logs/decisions.md (optional but recommended).
#   3. Review before the expires date — CI will warn on expired waivers.
#
# Example:
#   - rule: "ERR-008"
#     reason: "Internal prototype without user data — approved by @lead-dev on 2026-01-15"
#     expires: "2026-06-01"
#     approved_by: "@lead-dev"
waivers: []

# --- LLM Models (optional) ---
# Override the model used per agent via `renga models apply`.
# Without this section, each agent uses the model in its own frontmatter.
# models:
#   default: "Claude Opus 4.6 (copilot)"
#   overrides:
#     seiji: "Claude Sonnet 4.6 (copilot)"
#     security-engineer: "Claude Opus 4.6 (copilot)"
