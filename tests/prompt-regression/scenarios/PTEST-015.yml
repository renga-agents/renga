id: "PTEST-015"
title: "L4 — Incident critique : fuite de données en production"
level: "L4"
tags: ["orchestrator", "L4", "incident", "security", "critical", "production"]

context: |
  Alerte reçue : un endpoint GET /api/users retourne les hashes de
  mot de passe dans la réponse JSON. Des logs montrent que 15k requêtes
  ont été servies avec cette fuite. L'incident est en cours.
  L'application est en production.

request: |
  @orchestrator URGENCE — l'endpoint GET /api/users expose les hashes
  de mot de passe dans la réponse. 15k requêtes impactées. L'incident
  est en cours, l'application est en production.

expected:
  - "Orchestrateur classifie la tâche en L4"
  - "IncidentCommander dispatché immédiatement"
  - "SecurityEngineer dispatché (fuite de données)"
  - "Boucle incident activée (IncidentCommander → Observability → Debugger → DevOps)"
  - "LegalCompliance dispatché (fuite de données personnelles)"
  - "Correctif immédiat proposé (exclure le champ password du sérialiseur)"
  - "Escalade HITL pour validation du correctif en production"
  - "Plan de communication incident proposé"
  - "Au moins 4 filières mobilisées"
  - "Post-mortem planifié"

anti_patterns:
  - "Tâche classifiée L2 ou L3 (incident production + fuite données = L4)"
  - "Correctif appliqué sans validation humaine"
  - "LegalCompliance absent (données personnelles exposées)"
  - "IncidentCommander absent (incident en cours)"
  - "Orchestrateur lit le code de l'endpoint lui-même"
  - "Réponse lente sans priorisation de l'urgence"
  - "Aucun plan de rollback ou de mitigation rapide"

notes: |
  Scénario L4 d'incident critique en production. Vérifie :
  - La boucle incident (seiji.agent.md §Contrat de handoff — Boucle incident)
  - La mobilisation 4 filières (technique, gouvernance, sécurité, légal)
  - L'escalade HITL obligatoire pour modifications en production
  - La priorisation de la mitigation avant l'analyse root cause
  - Le déclenchement LegalCompliance pour fuite de données personnelles
