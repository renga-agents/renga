# Central LLM model configuration — DEFAULT TEMPLATE (read-only)
# ================================================================
#
# This file ships as the built-in default template. It is copied into the
# share directory by build_dist.py and read by `renga models apply` when no
# project-level override is found.
#
# PROJECT OVERRIDE: add a `models:` section to `.renga.yml` instead:
#
#   models:
#     default: "Claude Haiku 4.5 (copilot)"
#     overrides:
#       seiji: "Claude Sonnet 4.6 (copilot)"
#
# The `.renga.yml` models section takes precedence over this file.
# Do NOT edit this file directly in a consumer project.
#
# To change the model for ALL agents, run `renga models apply` after
# editing the `models:` section in `.renga.yml`.
#
# Supported model names (VS Code Copilot):
#   Claude Haiku 4.5 (copilot)
#   Claude Sonnet 4 (copilot)
#   gpt-4o
#   o3

# --- Default model for ALL agents ---
default: "Claude Haiku 4.5 (copilot)"

# --- Per-agent overrides (optional) ---
# Uncomment and add entries below to use a different model for specific agents.
#
# overrides:
#   orchestrator: gpt-4o
#   security-engineer: o3
#   frontend-dev: "Claude Sonnet 4 (copilot)"
