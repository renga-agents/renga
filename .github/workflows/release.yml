name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build distribution
        run: python3 scripts/build_dist.py --version "${{ steps.version.outputs.version }}"

      - name: Create tarball
        run: |
          cd dist
          tar czf "../renga-${{ steps.version.outputs.version }}.tar.gz" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: renga-${{ steps.version.outputs.version }}.tar.gz
          generate_release_notes: true
